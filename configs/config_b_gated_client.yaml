# Config B: Client-Side Orchestration + Gated Retrieval
# Auth enabled, ABAC policies enforce tenant isolation.
# Client manually calls search + chat completions.
# Per-tenant vector stores with owner-based access control.
version: 2
distro_name: experiment-gated-client
apis:
  - inference
  - vector_io
  - files
  - file_processors
providers:
  inference:
    - provider_id: openai
      provider_type: remote::openai
      config:
        api_key: ${env.OPENAI_API_KEY:=}
        base_url: ${env.OPENAI_BASE_URL:=https://api.openai.com/v1}
  vector_io:
    - provider_id: sqlite-vec
      provider_type: inline::sqlite-vec
      config:
        db_path: ${env.SQLITE_STORE_DIR:=~/.llama/distributions/experiment-b}/sqlite_vec.db
        persistence:
          namespace: vector_io::sqlite_vec
          backend: kv_default
  files:
    - provider_id: builtin-files
      provider_type: inline::localfs
      config:
        storage_dir: ${env.FILES_STORAGE_DIR:=~/.llama/distributions/experiment-b/files}
        metadata_store:
          table_name: files_metadata
          backend: sql_default
  file_processors:
    - provider_id: pypdf
      provider_type: inline::pypdf
storage:
  backends:
    kv_default:
      type: kv_sqlite
      db_path: ${env.SQLITE_STORE_DIR:=~/.llama/distributions/experiment-b}/kvstore.db
    sql_default:
      type: sql_sqlite
      db_path: ${env.SQLITE_STORE_DIR:=~/.llama/distributions/experiment-b}/sql_store.db
  stores:
    metadata:
      namespace: registry
      backend: kv_default
# -- To use alternative models, uncomment and edit the section below. -------
# models:
#   - model_id: your-llm-model-id
#     provider_id: openai
#     provider_model_id: your-llm-model-id
#   - model_id: your-embedding-model-id
#     provider_id: openai
#     provider_model_id: your-embedding-model-id
#     model_type: embedding
#     metadata:
#       embedding_dimension: 768      # must match your embedding model
# -- Also update vector_stores.default_embedding_model.model_id below. ------
registered_resources:
  models: []
  vector_dbs: []
server:
  port: 8321
  auth:
    provider_config:
      type: custom
      endpoint: http://localhost:9999/auth
    access_policy:
      - permit:
          actions: [create, read, update, delete]
        when: user is owner
        description: "Users can fully manage their own resources"
      - permit:
          actions: [read]
        when: user in owners namespaces
        description: "Users can read resources in their namespace"
      - permit:
          actions: [create, read, update, delete]
          resource: "model::*"
        description: "All users can access models"
      - permit:
          actions: [create]
          resource: "vector_store::*"
        description: "All users can create vector stores"
vector_stores:
  default_provider_id: sqlite-vec
  default_embedding_model:
    provider_id: openai
    model_id: text-embedding-3-small
  file_ingestion_params:
    default_chunk_size_tokens: 512
    default_chunk_overlap_tokens: 128
  chunk_retrieval_params:
    chunk_multiplier: 5
    max_tokens_in_context: 4000
    default_search_mode: vector
